name: CI

# main'e push ve tüm pull request'lerde çalışır.
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build, Test & SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Sonar'ın blame/geçmiş analizi için tam geçmiş gerekir.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SonarScanner bir JVM üzerinde çalışır.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # SonarScanner ve indirilen paketleri çalıştırmalar arasında önbelleğe al.
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarScanner tool
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarScanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      # begin -> build -> test(+coverage) -> end sırası zorunludur.
      # qualitygate.wait=true: Quality Gate geçilmezse bu adım (dolayısıyla job)
      # başarısız olur. Bir test başarısız olursa da "dotnet test" adımında durur.
      - name: Build, Test & Analyze
        env:
          # SonarCloud token'ı; repo Settings > Secrets > Actions altında tanımla.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"hasancagri_GitHubActionsExample" \
            /o:"hasancagri" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.qualitygate.wait=true

          dotnet build --configuration Release --no-incremental

          dotnet test --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings

          ./.sonar/scanner/dotnet-sonarscanner end \
            /d:sonar.token="${SONAR_TOKEN}"
